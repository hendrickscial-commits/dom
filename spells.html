<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magical Spell Generator</title>
  <style>
    * { 
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      text-align: center;
      text-shadow: 0 0 15px rgba(138, 43, 226, 0.7), 0 0 30px rgba(138, 43, 226, 0.4);
      margin-bottom: 30px;
      font-weight: 600;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      line-height: 1.2;
    }

    #spellArea { /*Spell display*/
      height: 180px;
      font-size: 2rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      margin: 20px 0;
      transition: background-color 0.5s ease;
      padding: 20px;
      font-weight: 500;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    button { /*Generate spell + reset*/
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #8a2be2, #6a11cb);
      color: white;
      cursor: pointer;
      margin: 5px;
      font-size: 1rem;
      font-weight: 500;
      transition: filter 0.2s, transform 0.15s, opacity 0.2s;
      box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
    }

    button:hover:not(:disabled) { /*Disables the bittons once pressed until generator has done a cycle*/
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #ingredientsList { /*Spell order*/
      list-style: none;
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 0;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    #ingredientsList li { /*Spell border and background*/
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      border: 1px solid rgba(138, 43, 226, 0.3);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <h1>Welcome to the Magical Spell Genrator!</h1>
  
  <div id="spellArea"></div>

  <button id="generateButton">Generate Spell</button>
  <button id="resetButton">Reset</button>
  <ul id="ingredientsList">
    <li>Dragon Scale</li>
    <li>Phoenix Feather</li>
    <li>Unicorn Horn</li>
  </ul>
<script>
  const spellArea = document.getElementById('spellArea');
  const generateButton = document.getElementById('generateButton');
  const resetButton = document.getElementById('resetButton');
  const ingredientsList = document.querySelectorAll('#ingredientsList li');
  
  generateButton.addEventListener('click', () => {
    generateButton.disabled = true;
    resetButton.disabled = true;
    
    let count = 3;
    spellArea.style.backgroundColor = "#1a1a2e";
    spellArea.textContent = count;

    const countdownInterval = setInterval(() => {
      count--;
      if (count > 0) {
        spellArea.textContent = count;
      } else {
        clearInterval(countdownInterval);
        const randomIndex = Math.floor(Math.random() * ingredientsList.length);
        const chosenIngredient = ingredientsList[randomIndex].textContent;
        const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        spellArea.textContent = `Spell Cast: ${chosenIngredient}!`;
        spellArea.style.backgroundColor = randomColor;
        generateButton.disabled = false;
        resetButton.disabled = false;
        }
      }, 1000);
    });
    resetButton.addEventListener('click', () => {
      spellArea.textContent = "Ready to cast a spell?";
      spellArea.style.backgroundColor = "#1a1a2e";
    });
</script>
  
</body>
</html>
