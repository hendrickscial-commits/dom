<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Profile Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f0f2f5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      #profileCard {
        background: white;
        width: 320px;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }

      #profileCard:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
      }

      #profileCard.active-status {
        border-color: #00a906;
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.1),
          0 0 0 3px rgba(76, 175, 80, 0.2),
          0 0 24px rgba(76, 175, 80, 0.25);
      }

      #profileCard img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #f0f2f5;
        margin-bottom: 16px;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }

      #profileName {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1c1e21;
        margin-bottom: 4px;
        letter-spacing: -0.2px;
      }

      #profileRole {
        color: #65676b;
        font-size: 0.95rem;
        margin-bottom: 12px;
        font-weight: 500;
      }

      #profileBio {
        color: #444950;
        font-size: 0.925rem;
        line-height: 1.5;
        margin-bottom: 22px;
      }

      button {
        width: 100%;
        padding: 10px 16px;
        margin-top: 8px;
        border: none;
        border-radius: 8px;
        background: #1877f2;
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition:
          background-color 0.2s ease,
          transform 0.1s ease;
        display: block;
      }

      button:hover {
        background: #166fe5;
      }

      button:active {
        transform: scale(0.98);
      }

      #toggleStatusBtn {
        background: #4caf50;
        margin-top: 12px;
      }

      #toggleStatusBtn:hover {
        background: #43a047;
      }

      #updateNameBtn {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <div id="profileCard">
      <img
        id="profileImage"
        src="https://img.magnific.com/free-vector/mans-face-flat-style_90220-2877.jpg?semt=ais_hybrid&w=740&q=80"
        alt="Profile Picture"
      />
      <h2 id="profileName">John Doe</h2>
      <p id="profileRole">Software Developer</p>
      <p id="profileBio">
        Passionate about coding and learning new technologies.
      </p>

      <button id="updateNameBtn">Update Name</button>
      <button id="updateRoleBtn">Update Role</button>
      <button id="toggleStatusBtn">Toggle Active Status</button>
      <button id="changeImageBtn">Change Image</button>
    </div>
    <script>
      const updateNameBtn = document.getElementById("updateNameBtn");
      const profileName = document.getElementById("profileName");

      updateNameBtn.addEventListener("click", () => {
        const newName = prompt("Enter new name:");
        if (newName) {
          // Ensures the user didn't click Cancel
          profileName.textContent = newName;
        }
      });
      const updateRoleBtn = document.getElementById("updateRoleBtn");
      const profileRole = document.getElementById("profileRole");

      updateRoleBtn.addEventListener("click", () => {
        const newRole = prompt("Enter new role:");
        if (newRole) {
          // Ensures the user didn't click Cancel
          profileRole.textContent = newRole;
        }
      });

      const toggleStatusBtn = document.getElementById("toggleStatusBtn");
      const profileCard = document.getElementById("profileCard");

      toggleStatusBtn.addEventListener("click", () => {
        profileCard.classList.toggle("active-status");
      });

      const changeImageBtn = document.getElementById("changeImageBtn");
      const profileImage = document.getElementById("profileImage");

      changeImageBtn.addEventListener("click", () => {
        const newImageUrl = prompt("Enter new image URL:");
        if (newImageUrl) {
          profileImage.src = newImageUrl;
          profileImage.onerror = () => {
            alert("Could not load image. Check the URL.");
            profileImage.src = "";
          };
        }
      });
    </script>
  </body>
</html>
